apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chema-vnext.fullname" . }}-config
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    {{- include "chema-vnext.labels" . | nindent 4 }}
data:
{{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
