{{- $root := . -}}
{{- $secretName := .Values.secret.name -}}
{{- range $key, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $root.Values.namespace.name | quote }}
  labels:
    app.kubernetes.io/name: {{ $svc.name }}
    {{- include "chema-vnext.labels" $root | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc.name }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $svc.name }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/part-of: chema-vnext
        {{- with $root.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $root.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "chema-vnext.serviceAccountName" $root }}
      automountServiceAccountToken: {{ $root.Values.serviceAccount.automountServiceAccountToken }}
      {{- include "chema-vnext.imagePullSecrets" $root | nindent 6 }}
      {{- with $root.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $svc.name }}
          image: {{ include "chema-vnext.image" (dict "root" $root "imageName" $svc.imageName) | quote }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          {{- with $root.Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $svc.port }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "chema-vnext.fullname" $root }}-config
          {{- if or $svc.usesDataServices $svc.usesStringEncryption $svc.agileConfigName }}
          env:
            {{- if $svc.usesDataServices }}
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: ConnectionStrings__Default
            - name: Redis__Configuration
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: Redis__Configuration
            - name: RabbitMQ__Connections__Default__HostName
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: RabbitMQ__Connections__Default__HostName
            - name: RabbitMQ__Connections__Default__Port
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: RabbitMQ__Connections__Default__Port
            - name: RabbitMQ__Connections__Default__UserName
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: RabbitMQ__Connections__Default__UserName
            - name: RabbitMQ__Connections__Default__Password
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: RabbitMQ__Connections__Default__Password
            - name: RabbitMQ__Connections__Default__VirtualHost
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: RabbitMQ__Connections__Default__VirtualHost
            {{- end }}
            {{- if $svc.usesStringEncryption }}
            - name: StringEncryption__DefaultPassPhrase
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: StringEncryption__DefaultPassPhrase
            {{- end }}
            {{- if $svc.agileConfigName }}
            - name: AgileConfig__appId
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: AgileConfig__appId__{{ if eq $key "httpapiHost" }}HttpApi{{ else if eq $key "backgroundWorker" }}BackgroundWorker{{ else }}Gateway{{ end }}
            - name: AgileConfig__secret
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: AgileConfig__secret__{{ if eq $key "httpapiHost" }}HttpApi{{ else if eq $key "backgroundWorker" }}BackgroundWorker{{ else }}Gateway{{ end }}
            - name: AgileConfig__name
              value: {{ $svc.agileConfigName | quote }}
            {{- end }}
          {{- end }}
          {{- if $svc.readinessProbe }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ $svc.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ $svc.readinessProbe.periodSeconds }}
          {{- end }}
          {{- if $svc.livenessProbe }}
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: {{ $svc.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ $svc.livenessProbe.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
      {{- with $root.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
