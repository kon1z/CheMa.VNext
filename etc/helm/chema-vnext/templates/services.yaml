{{- $root := . -}}
{{- range $key, $svc := .Values.services }}
{{- if and $svc.enabled $svc.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chema-vnext.componentName" (dict "root" $root "name" $svc.name) }}
  namespace: {{ $root.Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ include "chema-vnext.componentName" (dict "root" $root "name" $svc.name) }}
    {{- include "chema-vnext.labels" $root | nindent 4 }}
    {{- with $root.Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $root.Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $root.Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "chema-vnext.componentName" (dict "root" $root "name" $svc.name) }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
{{- end }}
{{- end }}
