{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name | quote }}
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    {{- include "chema-vnext.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $key, $value := .Values.secret.stringData }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
